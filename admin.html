<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFF7E6">
  <title>ErsteWörter – Verwalten</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app admin">

  <nav class="crumbs">
    <a href="index.html">🏠 Start</a>
    <span class="sep">›</span>
    <span class="here">Verwalten</span>
  </nav>

  <!-- Login -->
  <section id="login" class="screen active">
    <h1 class="logo">🔒 Verwalten</h1>
    <p class="subtitle">Bitte PIN eingeben</p>
    <input id="pin" class="text-input" type="password" inputmode="numeric" placeholder="PIN" style="max-width:220px;text-align:center;">
    <p id="login-error" class="hint"></p>
    <button id="login-btn" class="big-btn start">Anmelden</button>
    <a class="admin-link" href="index.html">← Zurück zum Spiel</a>
  </section>

  <!-- Verwaltung -->
  <section id="panel" class="screen">
    <h1 class="logo">⚙️ Wörter verwalten</h1>

    <div class="card">
      <h2 id="form-title" class="form-title">Neues Wort</h2>
      <label class="field">
        <span>Wort</span>
        <input id="f-wort" class="text-input" type="text" placeholder="z. B. KATZE" autocomplete="off">
      </label>
      <label class="field">
        <span>Kategorie</span>
        <input id="f-kat" class="text-input" type="text" placeholder="z. B. Tiere" list="kat-list" autocomplete="off">
        <datalist id="kat-list"></datalist>
      </label>
      <div class="field">
        <span>Bild (Foto oder Grafik)</span>
        <div class="file-pick">
          <input id="f-bild" type="file" accept="image/*" hidden>
          <button type="button" id="f-bild-btn" class="file-btn">📷 Bild wählen</button>
          <span id="f-bild-name" class="file-name">Keine Datei gewählt</span>
        </div>
      </div>
      <img id="preview" class="preview" alt="Vorschau">
      <div class="form-actions">
        <button id="add-btn" class="big-btn start">➕ Hinzufügen</button>
        <button id="cancel-btn" class="big-btn ghost" hidden>Abbrechen</button>
      </div>
      <p id="form-msg" class="hint"></p>
    </div>

    <h2 class="label">Wörter (<span id="count">0</span>)</h2>
    <div class="filter-bar">
      <input id="filter-text" class="text-input" type="search" placeholder="🔍 Suchen…" autocomplete="off">
      <select id="filter-cat" class="text-input"></select>
    </div>
    <div id="list" class="word-list"></div>

    <div class="card tools">
      <button id="export-btn" class="big-btn ghost">⬇️ Sichern</button>
      <label class="big-btn ghost file-label">⬆️ Importieren
        <input id="import-input" type="file" accept="application/json" hidden>
      </label>
      <button id="reset-btn" class="big-btn ghost">♻️ Zurücksetzen</button>
    </div>

    <a class="admin-link" href="index.html">← Zurück zum Spiel</a>
  </section>

</main>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="store.js"></script>
<script src="admin.js"></script>
</body>
</html>
